<div id="view-saves" class="view">
    <div class="saves-shell">

        <h2 class="saves-heading">— Select Save —</h2>

        <div class="saves-list-wrap">
            <!-- Populated dynamically by saves.js renderSavesList() -->
            <div class="saves-list" id="saves-list"></div><!-- /saves-list -->
        </div><!-- /saves-list-wrap -->

        <!-- Action buttons -->
        <div class="saves-footer">
